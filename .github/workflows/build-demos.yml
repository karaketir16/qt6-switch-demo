name: Build demos

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Check out required submodules
        run: |
          git submodule update --init third_party/qtbase third_party/qtdeclarative third_party/qtshadertools third_party/ryubing

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Show Docker version
        run: docker --version

      - name: Build host QtBase tools
        run: ./scripts/build-host-qt-tools.sh

      - name: Build Switch OpenSSL
        run: ./scripts/build-openssl-switch.sh

      - name: Configure Switch QtBase
        run: QT_HOST_PATH="$GITHUB_WORKSPACE/build/qtbase-host" ./scripts/configure-qtbase-switch.sh

      - name: Build Switch QtBase
        run: ./scripts/build-qtbase-switch.sh

      - name: Build widgets demo
        run: ./scripts/build-widgets-probe.sh

      - name: Build QtNetwork demo
        run: ./scripts/build-qt-network-test.sh

      - name: Build Qt module test
        run: ./scripts/build-qt-module-test.sh

      - name: Build host QtShaderTools tools
        run: QT_HOST_PATH="$GITHUB_WORKSPACE/build/qtbase-host" ./scripts/build-host-qtshadertools-tools.sh

      - name: Configure Switch QtShaderTools
        run: QT_HOST_PATH="$GITHUB_WORKSPACE/build/qtbase-host" ./scripts/configure-qtshadertools-switch.sh

      - name: Build Switch QtShaderTools
        run: ./scripts/build-qtshadertools-switch.sh

      - name: Build host QtDeclarative tools
        run: QT_HOST_PATH="$GITHUB_WORKSPACE/build/qtbase-host" ./scripts/build-host-qtdeclarative-tools.sh

      - name: Configure Switch QtDeclarative
        run: QT_HOST_PATH="$GITHUB_WORKSPACE/build/qtbase-host" ./scripts/configure-qtdeclarative-switch.sh

      - name: Build Switch QtDeclarative
        run: ./scripts/build-qtdeclarative-switch.sh

      - name: Build Qt Quick demo
        run: ./scripts/build-quick-probe.sh

      - name: Build patched Ryubing
        run: ./scripts/build-ryubing.sh

      - name: Verify demo outputs exist
        run: |
          test -f demo/widgets-app/qt6-switch-widgets-probe.nro
          test -f demo/qt-module-test/qt6-switch-module-test.nro
          test -f demo/qt-network-test/qt6-switch-network-test.nro
          test -f demo/quick-app/qt6-switch-quick-probe.nro
          test -f third_party/ryubing/src/Ryujinx/bin/Release/net10.0/Ryujinx.dll
          test -x third_party/ryubing/src/Ryujinx/bin/Release/net10.0/Ryujinx
